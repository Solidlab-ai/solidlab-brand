<!doctype html>
<html><head><meta charset="utf-8"><title>Logo variants</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .l { height: 130px; display: flex; align-items: center; justify-content: center; position: relative; }
  .l .wm { font-family: 'Geist', 'Inter Tight', sans-serif; font-weight: 700; font-size: 44px; letter-spacing: -0.02em; }
  .l.light { background: #F4F1EA; border: 1px solid #E8E4DB; }
  .l.dark  { background: #0A0A0A; }
  .l.oslo  { background: #4A5A62; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #5A5A5A; margin-top: 6px; text-align: center; }
</style></head><body>
<div class="card">
  <div class="slash">/ logo variants — lowercase, bold 700, −0.02em tracking</div>
  <div class="grid">
    <div>
      <div class="l light"><span class="wm" style="color:#0A0A0A">solidlab</span></div>
      <div class="cap">sort / antikkhvit — primary</div>
    </div>
    <div>
      <div class="l dark"><span class="wm" style="color:#F4F1EA">solidlab</span></div>
      <div class="cap">antikkhvit / sort — reverse</div>
    </div>
    <div>
      <div class="l oslo"><span class="wm" style="color:#F4F1EA">solidlab</span></div>
      <div class="cap">antikkhvit / oslo — brand</div>
    </div>
  </div>
</div>
</body></html>
