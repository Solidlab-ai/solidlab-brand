<!doctype html>
<html><head><meta charset="utf-8"><title>Logo variants</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  .l { height: 130px; display: flex; align-items: center; justify-content: center; position: relative; }
  .l .wm { font-family: 'Geist', 'Inter Tight', sans-serif; font-weight: 700; font-size: 44px; letter-spacing: -0.02em; }
  .l .mono { font-family: 'Geist', 'Inter Tight', sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -0.02em; }
  .l.light { background: #F4F1EA; border: 1px solid #E8E4DB; }
  .l.dark  { background: #0A0A0A; }
  .l.oslo  { background: #4A5A62; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #5A5A5A; margin-top: 6px; text-align: center; }
  .dl { display: flex; gap: 4px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .dl a {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #5A5A5A;
    padding: 4px 8px; border: 1px solid rgba(10,10,10,0.12);
    text-decoration: none; transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .dl a:hover { color: #0A0A0A; border-color: #4A5A62; }
  .dl a .s { color: #4A5A62; }
</style></head><body>

</body></html>
