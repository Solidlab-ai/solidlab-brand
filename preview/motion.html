<!doctype html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .row-m { display: grid; grid-template-columns: 180px 1fr 110px; gap: 16px; align-items: center; font-family: var(--font-mono); font-size: 12px; color: var(--fog); padding: 10px 0; border-bottom: 1px solid #E8E4DB; letter-spacing: 0.02em; }
  .row-m:last-child { border-bottom: 0; }
  .name { color: #0A0A0A; }
  .curve { height: 28px; display: flex; align-items: center; }
  svg { width: 100%; height: 28px; }
  path { fill: none; stroke: #4A5A62; stroke-width: 1.5; }
  .dur { text-align: right; color: #8A8A8A; }
</style></head><body>
<div class="card">
  <div class="slash">/ motion — functional only</div>
  <div class="row-m">
    <span class="name">fade-in on scroll</span>
    <span class="curve"><svg viewBox="0 0 100 30" preserveAspectRatio="none"><path d="M0 28 C 16 28, 30 4, 100 2"/></svg></span>
    <span class="dur">400ms · ease-out</span>
  </div>
  <div class="row-m">
    <span class="name">button hover</span>
    <span class="curve"><svg viewBox="0 0 100 30" preserveAspectRatio="none"><path d="M0 28 C 35 28, 65 2, 100 2"/></svg></span>
    <span class="dur">150ms · ease-in-out</span>
  </div>
  <div class="row-m">
    <span class="name">page transition</span>
    <span class="curve"><svg viewBox="0 0 100 30" preserveAspectRatio="none"><path d="M0 28 C 20 28, 50 15, 100 2"/></svg></span>
    <span class="dur">250ms · max</span>
  </div>
  <div class="row-m">
    <span class="name">never</span>
    <span class="curve" style="color:#8A8A8A;font-size:11px">bounce · spin · parallax · autoplay video on hero</span>
    <span class="dur">—</span>
  </div>
</div>
</body></html>
