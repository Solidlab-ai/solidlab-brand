<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 16px; }
  .row-s { display: flex; align-items: center; gap: 16px; }
  .bar { height: 8px; background: var(--oslo); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fog); width: 80px; letter-spacing: 0.04em; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--sort); margin-left: auto; }
</style></head><body>
<div class="card">
  <div class="slash">/ spacing · 8-point grid</div>
  <div class="row-s"><span class="lbl">space-1</span><div class="bar" style="width:4px"></div><span class="val">4px · hairline</span></div>
  <div class="row-s"><span class="lbl">space-2</span><div class="bar" style="width:8px"></div><span class="val">8px · tight</span></div>
  <div class="row-s"><span class="lbl">space-3</span><div class="bar" style="width:16px"></div><span class="val">16px · default</span></div>
  <div class="row-s"><span class="lbl">space-4</span><div class="bar" style="width:24px"></div><span class="val">24px · comfortable</span></div>
  <div class="row-s"><span class="lbl">space-5</span><div class="bar" style="width:32px"></div><span class="val">32px · loose</span></div>
  <div class="row-s"><span class="lbl">space-6</span><div class="bar" style="width:48px"></div><span class="val">48px · section</span></div>
  <div class="row-s"><span class="lbl">space-7</span><div class="bar" style="width:80px"></div><span class="val">80px · major block</span></div>
  <div class="row-s"><span class="lbl">space-8</span><div class="bar" style="width:120px"></div><span class="val">120px · page section</span></div>
</div>
</body></html>
