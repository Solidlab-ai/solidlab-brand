<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 18px; background: var(--antikkhvit); }
  .group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; padding: 12px 18px; border-radius: 0; border: 1px solid transparent; cursor: pointer; line-height: 1; transition: all 150ms ease; }
  .pri { background: #4A5A62; color: #F4F1EA; }
  .pri.hover { background: #6B8290; }
  .sec { background: transparent; color: #0A0A0A; border-color: #0A0A0A; }
  .sec.hover { background: #0A0A0A; color: #F4F1EA; }
  .ghost { background: transparent; color: #0A0A0A; border-color: #E8E4DB; }
  .ghost.hover { border-color: #0A0A0A; }
  .disabled { background: #E8E4DB; color: #8A8A8A; cursor: not-allowed; }
  .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fog); margin-bottom: 4px; }
</style></head><body>
<div class="card">
  <div class="slash">/ buttons — sharp, typographic, 150ms hover</div>
  <div>
    <div class="sub">/ primary</div>
    <div class="group">
      <button class="btn pri">Start a project →</button>
      <button class="btn pri hover">Hover state</button>
      <button class="btn disabled">Disabled</button>
    </div>
  </div>
  <div>
    <div class="sub">/ secondary</div>
    <div class="group">
      <button class="btn sec">Read the guide</button>
      <button class="btn sec hover">Hover state</button>
    </div>
  </div>
  <div>
    <div class="sub">/ ghost</div>
    <div class="group">
      <button class="btn ghost">/ view work</button>
      <button class="btn ghost hover">/ hover</button>
    </div>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
