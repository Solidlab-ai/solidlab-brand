<!doctype html>
<html><head><meta charset="utf-8"><title>Oslo family</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 130px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid transparent; }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.75; }
</style></head><body>
<div class="card">
  <div class="slash">/ oslo family — nordic blues</div>
  <div class="grid">
    <div class="sw" style="background:#4A5A62;color:#F4F1EA"><div><div class="tag">/ accent</div><div class="name" style="margin-top:6px">Oslo</div></div><div class="hex">#4A5A62</div></div>
    <div class="sw" style="background:#6B8290;color:#F4F1EA"><div><div class="tag">/ midtone</div><div class="name" style="margin-top:6px">Nordic Breeze</div></div><div class="hex">#6B8290</div></div>
    <div class="sw" style="background:#8B9BA0;color:#0A0A0A"><div><div class="tag">/ secondary</div><div class="name" style="margin-top:6px">Alvesølv</div></div><div class="hex">#8B9BA0</div></div>
    <div class="sw" style="background:#C9D4D8;color:#0A0A0A"><div><div class="tag">/ divider</div><div class="name" style="margin-top:6px">Linblå</div></div><div class="hex">#C9D4D8</div></div>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
