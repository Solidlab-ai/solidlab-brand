<!doctype html>
<html><head><meta charset="utf-8"><title>Utility + warm</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { height: 120px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid transparent; }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.75; }
</style></head><body>
<div class="card">
  <div class="slash">/ warm counterweight + utility greys</div>
  <div class="grid">
    <div class="sw" style="background:#D5CFC2;color:#0A0A0A"><div><div class="tag">/ warm</div><div class="name" style="margin-top:4px">Antikkgrå</div></div><div class="hex">#D5CFC2</div></div>
    <div class="sw" style="background:#5A5A5A;color:#F4F1EA"><div><div class="tag">/ body-sec</div><div class="name" style="margin-top:4px">Fog</div></div><div class="hex">#5A5A5A</div></div>
    <div class="sw" style="background:#8A8A8A;color:#F4F1EA"><div><div class="tag">/ tertiary</div><div class="name" style="margin-top:4px">Mist</div></div><div class="hex">#8A8A8A</div></div>
    <div class="sw" style="background:#E8E4DB;color:#0A0A0A;border-color:#D5CFC2"><div><div class="tag">/ border-l</div><div class="name" style="margin-top:4px">Border Light</div></div><div class="hex">#E8E4DB</div></div>
    <div class="sw" style="background:#1F1F1F;color:#F4F1EA"><div><div class="tag">/ border-d</div><div class="name" style="margin-top:4px">Border Dark</div></div><div class="hex">#1F1F1F</div></div>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
