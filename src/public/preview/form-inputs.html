<!doctype html>
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #5A5A5A; }
  .input { font-family: var(--font-sans); font-size: 14px; padding: 12px 14px; border: 1px solid #E8E4DB; background: #F4F1EA; border-radius: 0; color: #0A0A0A; outline: none; transition: border-color 150ms ease; }
  .input::placeholder { color: #8A8A8A; }
  .input.focus { border-color: #4A5A62; outline: 2px solid rgba(74,90,98,0.2); outline-offset: -1px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .check { display: flex; gap: 10px; align-items: center; font-family: var(--font-sans); font-size: 14px; }
  .box { width: 16px; height: 16px; border: 1px solid #0A0A0A; background: #F4F1EA; position: relative; }
  .box.on { background: #4A5A62; border-color: #4A5A62; }
  .box.on::after { content:""; position:absolute; left:4px; top:1px; width:5px; height:9px; border: solid #F4F1EA; border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style></head><body>
<div class="card">
  <div class="slash">/ form inputs — sharp, hairline borders</div>
  <div class="row">
    <div class="field"><label class="lbl">/ name</label><input class="input" value="Ulrik Andresen"></div>
    <div class="field"><label class="lbl">/ email</label><input class="input focus" value="hello@solidlab.ai"></div>
  </div>
  <div class="field"><label class="lbl">/ message</label><input class="input" placeholder="Tell us what you're building…"></div>
  <div style="display:flex;gap:20px;margin-top:4px">
    <div class="check"><span class="box on"></span>Newsletter, occasionally</div>
    <div class="check"><span class="box"></span>NDA required</div>
  </div>
</div>
<!-- Solidlab nav + sign out — auth gate (added by SMS-OTP migration v2) -->
<style>
  .solidlab-floating {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    gap: 8px;
  }
  .solidlab-floating button {
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
  }
  .solidlab-floating button:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-floating button {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-floating button:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
  /* Popup */
  .solidlab-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.6);
    z-index: 9998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .solidlab-popup-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .solidlab-popup {
    position: fixed;
    bottom: 80px;
    right: 24px;
    z-index: 9999;
    background: #0A0A0A;
    border: 1px solid #1F1F1F;
    padding: 16px;
    min-width: 280px;
    transform: translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: all 200ms ease;
  }
  .solidlab-popup.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  html[data-theme="light"] .solidlab-popup {
    background: #F4F1EA;
    border-color: #E8E4DB;
  }
  .solidlab-popup-label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8A8A8A;
    margin-bottom: 8px;
  }
  .solidlab-popup a {
    display: block;
    padding: 8px 0;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    color: #C9D4D8;
    text-decoration: none;
    transition: color 150ms ease;
  }
  .solidlab-popup a:hover { color: #F4F1EA; }
  html[data-theme="light"] .solidlab-popup a { color: #5A5A5A; }
  html[data-theme="light"] .solidlab-popup a:hover { color: #0A0A0A; }
  .solidlab-popup .current {
    color: #4A5A62;
    pointer-events: none;
  }
  .solidlab-popup .current::after {
    content: " · current";
    font-size: 9px;
    opacity: 0.6;
  }
</style>

<div class="solidlab-popup-overlay" id="solidlab-popup-overlay" onclick="solidlabClosePopup()"></div>

<div class="solidlab-popup" id="solidlab-popup">
  <div class="solidlab-popup-label">/ solidlab sites</div>
  <a href="https://solidlab.ai" target="_blank" rel="noopener">solidlab.ai ↗</a>
  <span class="current" id="solidlab-link-brand">brand.solidlab.ai</span>
  <a href="https://domains.solidlab.ai" target="_blank" rel="noopener" id="solidlab-link-domains" style="display:none">domains.solidlab.ai ↗</a>
  <a href="https://readme.solidlab.ai" target="_blank" rel="noopener" id="solidlab-link-readme" style="display:none">readme.solidlab.ai ↗</a>
  <a href="https://studio.solidlab.ai" target="_blank" rel="noopener">studio.solidlab.ai ↗</a>
</div>

<div class="solidlab-floating">
  <button onclick="solidlabTogglePopup()" aria-label="Solidlab sites menu">/ menu</button>
  <button onclick="solidlabSignOut()" aria-label="Sign out">/ sign out</button>
</div>

<script>
  (function() {
    function $(id) { return document.getElementById(id); }
    window.solidlabTogglePopup = function() {
      var p = $('solidlab-popup'), o = $('solidlab-popup-overlay');
      var open = p.classList.contains('open');
      if (open) { p.classList.remove('open'); o.classList.remove('open'); }
      else { p.classList.add('open'); o.classList.add('open'); }
    };
    window.solidlabClosePopup = function() {
      $('solidlab-popup').classList.remove('open');
      $('solidlab-popup-overlay').classList.remove('open');
    };
    window.solidlabSignOut = async function() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    };
    // Hent brukerens access og vis kun de tilatte linkene
    fetch('/api/me').then(function(r) { return r.ok ? r.json() : null; }).then(function(data) {
      if (!data) return;
      var access = data.access || [];
      if (access.indexOf('domains') !== -1) $('solidlab-link-domains').style.display = 'block';
      if (access.indexOf('readme') !== -1) $('solidlab-link-readme').style.display = 'block';
    }).catch(function(){});
  })();
</script>

</body></html>
