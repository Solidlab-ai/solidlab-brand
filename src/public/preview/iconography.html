<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .i { height: 56px; border: 1px solid #E8E4DB; display: flex; align-items: center; justify-content: center; color: #0A0A0A; }
  .i.accent { color: #4A5A62; border-color: #4A5A62; }
  .notes { font-family: var(--font-mono); font-size: 11px; color: #5A5A5A; letter-spacing: 0.02em; display: flex; gap: 18px; flex-wrap: wrap; }
  .notes b { color: #0A0A0A; font-weight: 500; }
  svg { width: 24px; height: 24px; }
</style></head><body>
<div class="card">
  <div class="slash">/ iconography — lucide · 1.5px · outlined only</div>
  <div class="grid">
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h12"/></svg></div>
    <div class="i accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 9h16"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 9-9 9-9-9 9-9z"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 6V4h12v2M8 6l1 14h6l1-14"/></svg></div>
  </div>
  <div class="notes">
    <span><b>stroke</b> 1.5px @ ≤24 · 2px @ ≥32</span>
    <span><b>fill</b> none (outlined only)</span>
    <span><b>color</b> fg monochrome · oslo on active</span>
    <span><b>no</b> emoji · no unicode · no filled</span>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
