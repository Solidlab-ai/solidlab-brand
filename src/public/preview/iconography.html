<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .i { height: 56px; border: 1px solid #E8E4DB; display: flex; align-items: center; justify-content: center; color: #0A0A0A; }
  .i.accent { color: #4A5A62; border-color: #4A5A62; }
  .notes { font-family: var(--font-mono); font-size: 11px; color: #5A5A5A; letter-spacing: 0.02em; display: flex; gap: 18px; flex-wrap: wrap; }
  .notes b { color: #0A0A0A; font-weight: 500; }
  svg { width: 24px; height: 24px; }
</style></head><body>
<div class="card">
  <div class="slash">/ iconography — lucide · 1.5px · outlined only</div>
  <div class="grid">
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h12"/></svg></div>
    <div class="i accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 9h16"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 9-9 9-9-9 9-9z"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <div class="i"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 6V4h12v2M8 6l1 14h6l1-14"/></svg></div>
  </div>
  <div class="notes">
    <span><b>stroke</b> 1.5px @ ≤24 · 2px @ ≥32</span>
    <span><b>fill</b> none (outlined only)</span>
    <span><b>color</b> fg monochrome · oslo on active</span>
    <span><b>no</b> emoji · no unicode · no filled</span>
  </div>
</div>
<!-- Solidlab nav + sign out — auth gate (added by SMS-OTP migration v2) -->
<style>
  .solidlab-floating {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    gap: 8px;
  }
  .solidlab-floating button {
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
  }
  .solidlab-floating button:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-floating button {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-floating button:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
  /* Popup */
  .solidlab-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.6);
    z-index: 9998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .solidlab-popup-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .solidlab-popup {
    position: fixed;
    bottom: 80px;
    right: 24px;
    z-index: 9999;
    background: #0A0A0A;
    border: 1px solid #1F1F1F;
    padding: 16px;
    min-width: 280px;
    transform: translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: all 200ms ease;
  }
  .solidlab-popup.open {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  html[data-theme="light"] .solidlab-popup {
    background: #F4F1EA;
    border-color: #E8E4DB;
  }
  .solidlab-popup-label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8A8A8A;
    margin-bottom: 8px;
  }
  .solidlab-popup a {
    display: block;
    padding: 8px 0;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    color: #C9D4D8;
    text-decoration: none;
    transition: color 150ms ease;
  }
  .solidlab-popup a:hover { color: #F4F1EA; }
  html[data-theme="light"] .solidlab-popup a { color: #5A5A5A; }
  html[data-theme="light"] .solidlab-popup a:hover { color: #0A0A0A; }
  .solidlab-popup .current {
    color: #4A5A62;
    pointer-events: none;
  }
  .solidlab-popup .current::after {
    content: " · current";
    font-size: 9px;
    opacity: 0.6;
  }
</style>

<div class="solidlab-popup-overlay" id="solidlab-popup-overlay" onclick="solidlabClosePopup()"></div>

<div class="solidlab-popup" id="solidlab-popup">
  <div class="solidlab-popup-label">/ solidlab sites</div>
  <a href="https://solidlab.ai" target="_blank" rel="noopener">solidlab.ai ↗</a>
  <span class="current" id="solidlab-link-brand">brand.solidlab.ai</span>
  <a href="https://domains.solidlab.ai" target="_blank" rel="noopener" id="solidlab-link-domains" style="display:none">domains.solidlab.ai ↗</a>
  <a href="https://readme.solidlab.ai" target="_blank" rel="noopener" id="solidlab-link-readme" style="display:none">readme.solidlab.ai ↗</a>
  <a href="https://studio.solidlab.ai" target="_blank" rel="noopener">studio.solidlab.ai ↗</a>
</div>

<div class="solidlab-floating">
  <button onclick="solidlabTogglePopup()" aria-label="Solidlab sites menu">/ menu</button>
  <button onclick="solidlabSignOut()" aria-label="Sign out">/ sign out</button>
</div>

<script>
  (function() {
    function $(id) { return document.getElementById(id); }
    window.solidlabTogglePopup = function() {
      var p = $('solidlab-popup'), o = $('solidlab-popup-overlay');
      var open = p.classList.contains('open');
      if (open) { p.classList.remove('open'); o.classList.remove('open'); }
      else { p.classList.add('open'); o.classList.add('open'); }
    };
    window.solidlabClosePopup = function() {
      $('solidlab-popup').classList.remove('open');
      $('solidlab-popup-overlay').classList.remove('open');
    };
    window.solidlabSignOut = async function() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    };
    // Hent brukerens access og vis kun de tilatte linkene
    fetch('/api/me').then(function(r) { return r.ok ? r.json() : null; }).then(function(data) {
      if (!data) return;
      var access = data.access || [];
      if (access.indexOf('domains') !== -1) $('solidlab-link-domains').style.display = 'block';
      if (access.indexOf('readme') !== -1) $('solidlab-link-readme').style.display = 'block';
    }).catch(function(){});
  })();
</script>

</body></html>
