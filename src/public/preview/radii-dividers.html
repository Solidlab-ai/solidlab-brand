<!doctype html>
<html><head><meta charset="utf-8"><title>Radii & rules</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 16px; }
  .row-r { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .demo { height: 80px; background: var(--oslo); display: flex; align-items: center; justify-content: center; color: var(--antikkhvit); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fog); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; text-align: center; }
  .rules { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .rl { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--fog); letter-spacing: 0.04em; }
</style></head><body>
<div class="card">
  <div class="slash">/ radii · architectural sharpness</div>
  <div class="row-r">
    <div>
      <div class="demo" style="border-radius:0">0px</div>
      <div class="cap">default · button, card, input</div>
    </div>
    <div>
      <div class="demo" style="border-radius:4px">4px</div>
      <div class="cap">soft · tag, pill only</div>
    </div>
    <div>
      <div class="demo" style="border-radius:50%;width:80px;margin:0 auto">50%</div>
      <div class="cap">circle · avatar, dot</div>
    </div>
  </div>
  <div class="slash" style="margin-top:4px">/ dividers</div>
  <div class="rules">
    <div class="rl"><span>hairline · 1px</span><div style="height:1px;background:#E8E4DB"></div></div>
    <div class="rl"><span>medium · 2px @20%</span><div style="height:2px;background:rgba(74,90,98,0.2)"></div></div>
    <div class="rl"><span>accent · 3px oslo</span><div style="height:3px;background:#4A5A62"></div></div>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
