<!doctype html>
<html><head><meta charset="utf-8"><title>Slash system</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card.dark { padding: 32px 28px; gap: 22px; }
  .big { font-family: var(--font-mono); font-size: 120px; color: #4A5A62; line-height: 0.8; font-weight: 500; }
  .row-l { display: grid; grid-template-columns: 160px 1fr; gap: 16px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #8A8A8A; }
  .ex { font-family: var(--font-mono); font-size: 16px; color: #F4F1EA; letter-spacing: 0.02em; }
  .ex b { color: #6B8290; font-weight: 500; }
  .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; align-items: center; }
</style></head><body>
<div class="card dark">
  <div class="slash">/ the forward slash — signature element</div>
  <div class="grid">
    <div class="big">/</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="row-l"><span class="tag">prefix</span><span class="ex"><b>/</b> about  ·  <b>/</b> work  ·  <b>/</b> contact</span></div>
      <div class="row-l"><span class="tag">numbering</span><span class="ex"><b>/</b> 01  ·  <b>/</b> 02  ·  <b>/</b> 03</span></div>
      <div class="row-l"><span class="tag">separator</span><span class="ex">stavanger <b>/</b> norway</span></div>
      <div class="row-l"><span class="tag">tagline</span><span class="ex">built <b>/</b> since 2026</span></div>
    </div>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
