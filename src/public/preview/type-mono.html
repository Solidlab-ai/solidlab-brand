<!doctype html>
<html><head><meta charset="utf-8"><title>Mono & labels</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card.dark { padding: 32px 24px; gap: 18px; }
  .big { font-family: var(--font-mono); font-size: 36px; color: var(--antikkhvit); letter-spacing: -0.01em; font-weight: 500; }
  .row-b { display: flex; gap: 12px; flex-wrap: wrap; }
  .chip { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mist); padding: 4px 8px; border: 1px solid var(--border-dark); border-radius: 4px; }
  .chip.accent { color: var(--oslo); border-color: var(--oslo); }
  .caption { font-family: var(--font-mono); font-size: 12px; color: var(--mist); letter-spacing: 0.04em; }
</style></head><body>
<div class="card dark">
  <div class="slash">/ geist mono — technical accents</div>
  <div class="big">/ 01 — system / v1.1</div>
  <div class="row-b">
    <span class="chip">/ label</span>
    <span class="chip">/ 02</span>
    <span class="chip">stavanger / norway</span>
    <span class="chip accent">/ active</span>
    <span class="chip">v1.1.0</span>
  </div>
  <div class="caption">12px · letter-spacing +0.08em · uppercase · Fog/Mist</div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
