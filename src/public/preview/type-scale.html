<!doctype html>
<html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 24px; gap: 14px; }
  .row-t { display: grid; grid-template-columns: 90px 1fr 70px; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px; }
  .row-t:last-child { border-bottom: 0; padding-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fog); }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--mist); text-align: right; }
  .s { color: var(--sort); letter-spacing: -0.01em; }
</style></head><body>
<div class="card">
  <div class="slash">/ type scale · 1.25 ratio</div>
  <div class="row-t"><span class="label">h1</span><span class="s" style="font-size:40px;font-weight:700;letter-spacing:-0.02em;line-height:1.1">Nordic craft</span><span class="spec">48/1.1·700</span></div>
  <div class="row-t"><span class="label">h2</span><span class="s" style="font-size:28px;font-weight:600;line-height:1.2">Section header</span><span class="spec">32/1.2·600</span></div>
  <div class="row-t"><span class="label">h3</span><span class="s" style="font-size:22px;font-weight:600;line-height:1.3">Subsection header</span><span class="spec">24/1.3·600</span></div>
  <div class="row-t"><span class="label">h4</span><span class="s" style="font-size:18px;font-weight:600;line-height:1.4">Card title</span><span class="spec">18/1.4·600</span></div>
  <div class="row-t"><span class="label">body lg</span><span class="s" style="font-size:18px;line-height:1.6">Lead paragraph text for introductions.</span><span class="spec">18/1.6·400</span></div>
  <div class="row-t"><span class="label">body</span><span class="s" style="font-size:16px;line-height:1.6">Default paragraph text sits here with room.</span><span class="spec">16/1.6·400</span></div>
  <div class="row-t"><span class="label">small</span><span class="s" style="font-size:14px;line-height:1.5;color:var(--fog)">Captions, metadata, footnotes.</span><span class="spec">14/1.5·400</span></div>
</div>
</body></html>
