<!doctype html>
<html><head><meta charset="utf-8"><title>Type specimen</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 32px 24px; gap: 8px; background: var(--antikkhvit); }
  .display { font-size: 72px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.0; color: var(--sort); }
  .sub { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fog); margin-top: 8px; }
  .meta { display: flex; gap: 24px; margin-top: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--fog); }
  .meta span b { color: var(--sort); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="slash">/ primary typeface</div>
  <div class="display">Geist</div>
  <div class="sub">building solid software</div>
  <div class="meta">
    <span><b>400</b> regular</span>
    <span><b>500</b> medium</span>
    <span><b>600</b> semibold</span>
    <span><b>700</b> bold</span>
  </div>
</div>
</body></html>
