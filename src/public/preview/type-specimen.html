<!doctype html>
<html><head><meta charset="utf-8"><title>Type specimen</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 32px 24px; gap: 8px; background: var(--antikkhvit); }
  .display { font-size: 72px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.0; color: var(--sort); }
  .sub { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fog); margin-top: 8px; }
  .meta { display: flex; gap: 24px; margin-top: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--fog); }
  .meta span b { color: var(--sort); font-weight: 500; }
</style>
</head><body>
<div class="card">
  <div class="slash">/ primary typeface</div>
  <div class="display">Geist</div>
  <div class="sub">building solid software</div>
  <div class="meta">
    <span><b>400</b> regular</span>
    <span><b>500</b> medium</span>
    <span><b>600</b> semibold</span>
    <span><b>700</b> bold</span>
  </div>
</div>
<!-- Sign out — auth gate (added by SMS-OTP migration) -->
<style>
  .solidlab-signout {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    color: #8B9BA0;
    border: 1px solid #1F1F1F;
    padding: 10px 14px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms ease;
    line-height: 1;
    border-radius: 0;
  }
  .solidlab-signout:hover {
    color: #F4F1EA;
    border-color: #4A5A62;
    background: rgba(74, 90, 98, 0.15);
  }
  html[data-theme="light"] .solidlab-signout {
    background: rgba(244, 241, 234, 0.85);
    color: #5A5A5A;
    border-color: #E8E4DB;
  }
  html[data-theme="light"] .solidlab-signout:hover {
    color: #0A0A0A;
    border-color: #4A5A62;
  }
</style>
<button class="solidlab-signout" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});window.location.href='/login';})()" aria-label="Sign out">
  / sign out
</button>

</body></html>
